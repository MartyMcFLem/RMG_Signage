<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.name }}</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: none;
      font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif;
    }
    #signage-root {
      position: relative;
      width: 100%; height: 100%;
    }
    .widget {
      position: absolute;
      overflow: hidden;
    }
    /* Clock */
    .widget-clock {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .clock-time {
      font-weight: bold;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,.5);
      white-space: nowrap;
    }
    .clock-date {
      margin-top: 8px;
      opacity: .85;
      white-space: nowrap;
    }
    /* Text */
    .widget-text {
      display: flex;
      align-items: center;
      overflow: hidden;
      word-break: break-word;
      text-shadow: 0 1px 8px rgba(0,0,0,.4);
    }
    /* Weather */
    .widget-weather {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-shadow: 0 1px 8px rgba(0,0,0,.4);
    }
    .weather-city   { opacity: .8; white-space: nowrap; }
    .weather-icon   { line-height: 1; }
    .weather-temp   { font-weight: bold; line-height: 1; }
    .weather-desc   { opacity: .8; white-space: nowrap; text-align: center; }
    .weather-detail { opacity: .6; font-size: .75em; margin-top: 4px; }
    /* Media */
    .widget-media {
      background: #000;
    }
    .widget-media img,
    .widget-media video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }
    /* News ticker */
    .widget-ticker {
      overflow: hidden;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }
    .ticker-inner {
      display: inline-block;
      white-space: nowrap;
      animation: ticker-scroll 30s linear infinite;
    }
    .ticker-sep { margin: 0 40px; opacity: .4; }
    @keyframes ticker-scroll {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div id="signage-root"></div>

<script>
/* ═══════════════════════════════════════════════════
   RMG Signage — Signage Page Renderer
   Page config injected by Flask via Jinja2 tojson.
   ═══════════════════════════════════════════════════ */
const PAGE = {{ page | tojson }};

const WMO = {
  0: ['Ciel dégagé','☀️'], 1: ['Principalement dégagé','🌤️'],
  2: ['Partiellement nuageux','⛅'], 3: ['Couvert','☁️'],
  45: ['Brouillard','🌫️'], 48: ['Brouillard givrant','🌫️'],
  51: ['Bruine légère','🌦️'], 53: ['Bruine','🌦️'], 55: ['Bruine dense','🌦️'],
  61: ['Pluie légère','🌧️'], 63: ['Pluie','🌧️'], 65: ['Pluie forte','🌧️'],
  71: ['Neige légère','❄️'], 73: ['Neige','❄️'], 75: ['Neige forte','❄️'],
  77: ['Grésil','🌨️'],
  80: ['Averses légères','🌦️'], 81: ['Averses','⛈️'], 82: ['Averses fortes','⛈️'],
  85: ['Averses de neige','❄️'], 86: ['Averses de neige fortes','❄️'],
  95: ['Orage','⛈️'], 96: ['Orage + grêle','⛈️'], 99: ['Orage violent','⛈️'],
};

const DAYS_FR   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function formatTimeFR(d) {
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  const s = String(d.getSeconds()).padStart(2,'0');
  return {h, m, s};
}
function formatDateFR(d) {
  return DAYS_FR[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS_FR[d.getMonth()] + ' ' + d.getFullYear();
}

/* ── DOM builders ─────────────────────────────────── */
function makeWidget(w) {
  const el = document.createElement('div');
  el.id = 'w-' + w.id;
  el.className = 'widget widget-' + w.type;
  el.style.cssText = `left:${w.x||0}%;top:${w.y||0}%;width:${w.w||50}%;height:${w.h||30}%;`;
  return el;
}

function buildClock(w) {
  const cfg = w.config || {};
  const el = makeWidget(w);
  const showSec = !!cfg.show_seconds;
  const showDate = !!cfg.show_date;
  const color = cfg.color || '#ffffff';
  const sz = cfg.font_size || 80;
  const dateSz = cfg.date_font_size || Math.max(20, Math.round(sz * 0.32));
  el.innerHTML = `
    <div class="clock-time" style="font-size:${sz}px;color:${color}" data-show-sec="${showSec}">--:--</div>
    ${showDate ? `<div class="clock-date" style="font-size:${dateSz}px;color:${cfg.date_color||color}"></div>` : ''}`;
  return el;
}

function buildText(w) {
  const cfg = w.config || {};
  const el = makeWidget(w);
  const align = cfg.align || 'center';
  el.style.justifyContent = align === 'left' ? 'flex-start' : align === 'right' ? 'flex-end' : 'center';
  el.style.textAlign = align;
  el.style.fontSize  = (cfg.font_size || 48) + 'px';
  el.style.color     = cfg.color || '#ffffff';
  if (cfg.bold) el.style.fontWeight = 'bold';
  if (cfg.italic) el.style.fontStyle = 'italic';
  el.innerHTML = cfg.text || '';
  return el;
}

function buildWeather(w) {
  const cfg = w.config || {};
  const el = makeWidget(w);
  const color = cfg.color || '#ffffff';
  const citySz = cfg.city_font_size || 22;
  const tempSz = cfg.temp_font_size || 72;
  const descSz = cfg.desc_font_size || 22;
  const iconSz = cfg.icon_font_size || 64;
  el.style.color = color;
  el.dataset.lat  = cfg.lat  || 48.85;
  el.dataset.lon  = cfg.lon  || 2.35;
  el.dataset.unit = cfg.unit || 'celsius';
  el.dataset.city = cfg.city || '';
  el.innerHTML = `
    ${cfg.city ? `<div class="weather-city" style="font-size:${citySz}px">${cfg.city}</div>` : ''}
    <div class="weather-icon" style="font-size:${iconSz}px">…</div>
    <div class="weather-temp" style="font-size:${tempSz}px">--°</div>
    <div class="weather-desc" style="font-size:${descSz}px"></div>
    <div class="weather-detail"></div>`;
  return el;
}

function buildMedia(w) {
  const cfg = w.config || {};
  const el = makeWidget(w);
  const fit = cfg.fit || 'contain';
  el.innerHTML = `
    <img  class="w-mimg" style="object-fit:${fit};display:none" src="" alt="">
    <video class="w-mvid" style="object-fit:${fit};display:none" src="" muted autoplay playsinline></video>`;
  el.dataset.fit  = fit;
  el.dataset.dur  = cfg.duration || 8;
  return el;
}

function buildTicker(w) {
  const cfg = w.config || {};
  const el = makeWidget(w);
  const color = cfg.color || '#ffffff';
  const sz = cfg.font_size || 28;
  const bg = cfg.bg_color || 'rgba(0,0,0,0.5)';
  el.style.cssText += `background:${bg};font-size:${sz}px;color:${color};padding:0 20px;`;
  el.innerHTML = `<div class="ticker-inner" id="ticker-${w.id}">Chargement...</div>`;
  el.dataset.url = cfg.rss_url || '';
  el.dataset.speed = cfg.speed || 60;
  return el;
}

/* ── Render all widgets ───────────────────────────── */
function initPage(page) {
  const root = document.getElementById('signage-root');
  const bg = page.bg_color || '#1a1a2e';
  document.body.style.background = bg;
  root.style.background = bg;

  for (const w of (page.widgets || [])) {
    let el = null;
    if (w.type === 'background') {
      const c = (w.config || {}).color || bg;
      root.style.background = c;
      document.body.style.background = c;
      continue;
    } else if (w.type === 'clock') {
      el = buildClock(w);
    } else if (w.type === 'text') {
      el = buildText(w);
    } else if (w.type === 'weather') {
      el = buildWeather(w);
    } else if (w.type === 'media') {
      el = buildMedia(w);
    } else if (w.type === 'ticker') {
      el = buildTicker(w);
    }
    if (el) root.appendChild(el);
  }

  // Start dynamic content
  updateAllClocks();
  setInterval(updateAllClocks, 1000);

  document.querySelectorAll('.widget-weather').forEach(el => {
    loadWeather(el);
  });
  setInterval(() => {
    document.querySelectorAll('.widget-weather').forEach(el => loadWeather(el));
  }, 5 * 60 * 1000);

  document.querySelectorAll('.widget-media').forEach(el => {
    startMediaWidget(el);
  });

  document.querySelectorAll('.widget-ticker').forEach(el => {
    loadTicker(el);
  });
}

/* ── Clock ────────────────────────────────────────── */
function updateAllClocks() {
  const now = new Date();
  const {h, m, s} = formatTimeFR(now);
  const dateStr = formatDateFR(now);
  document.querySelectorAll('.widget-clock').forEach(el => {
    const timeEl = el.querySelector('.clock-time');
    const dateEl = el.querySelector('.clock-date');
    if (timeEl) {
      const showSec = timeEl.dataset.showSec === 'true';
      timeEl.textContent = showSec ? `${h}:${m}:${s}` : `${h}:${m}`;
    }
    if (dateEl) dateEl.textContent = dateStr;
  });
}

/* ── Weather ──────────────────────────────────────── */
async function loadWeather(el) {
  const lat  = el.dataset.lat;
  const lon  = el.dataset.lon;
  const unit = el.dataset.unit || 'celsius';
  try {
    const resp = await fetch(`/api/weather?lat=${lat}&lon=${lon}&unit=${unit}`);
    if (!resp.ok) return;
    const data = await resp.json();
    const cw   = data.current_weather || {};
    const temp = Math.round(cw.temperature ?? 0);
    const code = cw.weathercode ?? 0;
    const [desc, icon] = WMO[code] || ['--', '?'];

    // Current hour index for humidity / feelslike
    let humidity = '', feelslike = '';
    try {
      const now  = new Date();
      const hStr = String(now.getHours()).padStart(2,'0');
      const times = (data.hourly || {}).time || [];
      const idx   = times.findIndex(t => t && t.includes('T' + hStr + ':'));
      if (idx >= 0) {
        const rh = ((data.hourly || {}).relativehumidity_2m || [])[idx];
        const fl = ((data.hourly || {}).apparent_temperature || [])[idx];
        if (rh  !== undefined) humidity  = `💧 ${Math.round(rh)} %`;
        if (fl  !== undefined) feelslike = `Ressenti ${Math.round(fl)}°`;
      }
    } catch (_) {}

    const sym = unit === 'fahrenheit' ? '°F' : '°C';
    el.querySelector('.weather-icon').textContent = icon;
    el.querySelector('.weather-temp').textContent = `${temp}${sym}`;
    el.querySelector('.weather-desc').textContent = desc;
    el.querySelector('.weather-detail').textContent = [feelslike, humidity].filter(Boolean).join('  ');
  } catch (e) {
    const iconEl = el.querySelector('.weather-icon');
    if (iconEl) iconEl.textContent = '?';
  }
}

/* ── Media widget ─────────────────────────────────── */
let _mediaFiles = null;

async function getMediaFiles() {
  if (_mediaFiles) return _mediaFiles;
  try {
    const resp = await fetch('/api/files');
    if (resp.ok) _mediaFiles = await resp.json();
  } catch (_) {}
  return _mediaFiles || [];
}

function startMediaWidget(el) {
  const imgEl = el.querySelector('.w-mimg');
  const vidEl = el.querySelector('.w-mvid');
  if (!imgEl || !vidEl) return;
  const dur = parseFloat(el.dataset.dur || 8) * 1000;
  const VIDEO_RE = /\.(mp4|avi|mkv|mov|webm|m4v)$/i;

  let files = [];
  let idx = 0;

  function showNext() {
    if (!files.length) return;
    const file = files[idx];
    idx = (idx + 1) % files.length;
    const url = '/media/' + encodeURIComponent(file);
    if (VIDEO_RE.test(file)) {
      imgEl.style.display = 'none';
      vidEl.src = url;
      vidEl.style.display = 'block';
      vidEl.load();
      vidEl.play().catch(() => {});
      vidEl.onended = showNext;
      vidEl.onerror = () => setTimeout(showNext, 1000);
    } else {
      vidEl.style.display = 'none';
      vidEl.pause();
      imgEl.src = url;
      imgEl.style.display = 'block';
      imgEl.onerror = () => setTimeout(showNext, 1000);
      setTimeout(showNext, dur);
    }
  }

  getMediaFiles().then(f => {
    files = f;
    if (files.length) showNext();
  });
}

/* ── News Ticker ─────────────────────────────────── */
async function loadTicker(el) {
  const url = el.dataset.url;
  const tickerEl = el.querySelector('.ticker-inner');
  if (!tickerEl) return;
  if (!url) { tickerEl.textContent = 'Configurez une URL RSS dans les paramètres de ce widget.'; return; }
  try {
    const resp = await fetch('/api/rss-proxy?url=' + encodeURIComponent(url));
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const titles = (data.items || []).map(i => i.title).filter(Boolean);
    if (!titles.length) { tickerEl.textContent = 'Aucune actualité disponible.'; return; }
    tickerEl.innerHTML = titles.map(t => `<span>${t}</span><span class="ticker-sep">•</span>`).join('');
    // Adjust speed based on content length
    const speed = parseInt(el.dataset.speed || 60);
    const len = tickerEl.scrollWidth;
    const dur = Math.max(10, len / speed);
    tickerEl.style.animationDuration = dur + 's';
  } catch (e) {
    tickerEl.textContent = 'Actualités indisponibles.';
  }
}

/* ── Start ─────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => initPage(PAGE));
</script>
</body>
</html>
