name: Auto Version

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Récupérer le dernier tag (vide si aucun)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Dernier tag : ${LAST_TAG:-aucun}"

          # Commits depuis le dernier tag (ou tous si pas de tag)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log HEAD --pretty=format:"%s")
            LAST_TAG="v0.0.0"
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi
          echo "Commits depuis $LAST_TAG :"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "Aucun nouveau commit depuis le dernier tag — pas de nouvelle version."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Déterminer le type de bump selon les Conventional Commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.+\))?!:|^fix(\(.+\))?!:|BREAKING[- ]CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "Type de bump : $BUMP"

          # Calculer la nouvelle version
          VERSION="${LAST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Nouvelle version : $NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG"       >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"               >> "$GITHUB_OUTPUT"
          echo "skip=false"              >> "$GITHUB_OUTPUT"

      - name: Générer le changelog
        if: steps.bump.outputs.skip != 'true'
        id: changelog
        run: |
          LAST_TAG="${{ steps.bump.outputs.last_tag }}"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          BUMP="${{ steps.bump.outputs.bump }}"

          NOTES="## ${NEW_VERSION}\n\n"
          NOTES+="**Type de changement :** \`${BUMP}\`\n\n"
          NOTES+="### Commits inclus\n\n"

          GIT_RANGE=$( [ "$LAST_TAG" = "v0.0.0" ] && echo "HEAD" || echo "${LAST_TAG}..HEAD" )
          while IFS= read -r line; do
            NOTES+="- ${line}\n"
          done < <(git log "$GIT_RANGE" --pretty=format:"%s (%h)" | head -50)

          # Écrire dans un fichier pour éviter les problèmes d'échappement
          printf '%b' "$NOTES" > release_notes.md
          cat release_notes.md

      - name: Créer le tag et la release GitHub
        if: steps.bump.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"

          gh release create "$NEW_VERSION" \
            --title "RMG Signage $NEW_VERSION" \
            --notes-file release_notes.md
